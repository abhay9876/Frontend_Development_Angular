
<div class="container">

  <div class="card">

    <div class="content">

     
      <h4 class="logo">
        <span class="g">F</span><span class="o1">u</span><span class="o2">n</span>
        <span class="g2">d</span><span class="l">o</span><span class="e">o</span>
      </h4>

    
      <h2 class="title">Forget Password</h2>
      

      <form [formGroup]="forgetForm" (ngSubmit)="onSubmit()">

        <div class="input-box">
          <input type="text" required formControlName="email">
          <label>Email </label>
        </div>

        <div class="actions">
          <button class="btn" type="submit" >Next</button>
        </div>

      </form>

    </div>

  </div>

</div>
