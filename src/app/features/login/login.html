<div class="login">
  <h1>Sign In</h1>
  <br />
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="input-box">
      <input type="text" required formControlName="userName" />
      <label>UserName</label>
    </div>

    <div class="pass-box">
      <input type="password" required formControlName="password" />
      <label>password</label>
    </div>

    <a routerLink="/forget-password" class="link">Forgot Password?</a>

    <div class="actions">
      <a routerLink="/register" class="link">Create account</a>
      <button class="btn" type="submit">Next</button>
    </div>
  </form>
</div>
