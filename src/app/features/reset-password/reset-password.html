<div class="container">

  <div class="card">

    <div class="content">

     
      <h4 class="logo">
        <span class="g">F</span><span class="o1">u</span><span class="o2">n</span>
        <span class="g2">d</span><span class="l">o</span><span class="e">o</span>
      </h4>

    
      <h2 class="title">Reset Password</h2>

      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">


        <div class="pass-box">
          <input type="password" required formControlName = "newPassword">
          <label>New Password</label>
        </div>

        <div class="pass-box">
          <input type="password" required formControlName = "confirmPassword">
          <label>Confirm Password</label>
        </div>


        <div class="actions">
          <button class="btn" type="submit" >Next</button>
        </div>

      </form>

    </div>

  </div>

</div>
