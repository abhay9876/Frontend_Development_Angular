<div class="header">
  <div class="left">
    <span class="material-icons menu" (click)="onToggleSidebar()">menu</span>
    <img src="Keep.png" class="logo" />
    <span class="title">Fundoo</span>
  </div>

  <div class="search-bar">
    <span class="material-icons">search</span>
    <input type="text" placeholder="Search" (input)="onSearch($event)" />
  </div>

  <div class="right">
    <span class="material-icons icon" (click)="onRefresh()">refresh</span>
    <span class="material-icons icon" (click)="onToggleView()">
      {{ viewMode === 'grid' ? 'view_agenda' : 'grid_view' }}
    </span>

    <span class="material-icons icon">settings</span>
    <span class="material-icons icon">apps</span>
    <div class="profile-container" (click)="toggleDropdown($event)">
      <img src="profile.jpg" class="profile" />

      <span class="user-name">{{ userName }}</span>

      <div class="dropdown" *ngIf="showDropdown">
        <div class="dropdown-item" (click)="logout($event)">Logout</div>
      </div>
    </div>
  </div>
</div>
